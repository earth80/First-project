<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Professional sample template 2026</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="contact.css" />
    
  </head>
  <body>
    <section class="banner">
      <header>
        <nav>
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="Services.html">Services</a></li>
            <li><a href="Contact.html">Contact</a></li>
          </ul>
        </nav>
        </ul>

        <a href="#" class="logo"><span>my </span>sample work</a>

      </header>

      <section class="contact" id="contact">

        <div class="container">
          <div class="section-header">
            <span class="section-subtitle">Get In Touch</span>
            <h2>Contact Us</h2>
            <p>Have any questions or want to get in touch? Fill out the form below and we'll get back to you as soon as possible.</p>
          </div>
          <div class="contact-form">
            <form action="#" method="post">
              <div class="form-group">
                <input type="text" name="name" placeholder="Your Name" required />
              </div>
              <div class="form-group">
                <input type="email" name="email" placeholder="Your Email" required />
              </div>
              <div class="form-group">
                <textarea name="message" placeholder="Your Message" required></textarea>
              </div>
              <button type="submit" class="submit-btn">Send Message</button>
            </form>
          </div>
        </div>

      </section>
     <ul class="sci">
        <li>
          <a href="https://www.facebook.com/logins/" target="_blank">
            <ion-icon name="logo-facebook"></ion-icon>
          </a>
        </li>
        <li>
          <a href="https://twitter.com/" target="_blank">
            <ion-icon name="logo-twitter"></ion-icon>
          </a>
        </li>
        <li>
          <a href="https://www.instagram.com/" target="_blank">
            <ion-icon name="logo-instagram"></ion-icon>
          </a>
        </li>
      </ul>
      <div class="dayNight">
        <ion-icon name="moon-outline"></ion-icon>
        <ion-icon name="sunny-outline"></ion-icon>
      </div>
    </section>
<script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
    <script>
      let banner = document.querySelector(".banner");
      let dayNight = document.querySelector(".dayNight");

      dayNight.onclick = function () {
        banner.classList.toggle("night");
      };
    </script>

    <script src="https://unpkg.com/typed.js@3.0.0/dist/typed.umd.js"></script>
    <script>
      var typed = new Typed("#text", {
        strings: ["My", " Professional", "Creative"],
        typeSpeed: 50,
        backSpeed: 50,
        backDelay: 1500,
        loop: true,
      });
    </script>

  </body>
  
</html>
