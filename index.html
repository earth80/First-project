<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Professional sample template 2026</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="banner">
      <header>
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Services</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
        <a href="#" class="logo"><span>my </span>sample work</a>
      </header>
      <div class="content">
        <h3>Hi</h3>
        <h2>Welcome to <span id="text">My</span> Sample Work</h2>
        <p>
          This is a simple professional template for showcasing my work. I am a
          creative and motivated web developer who is passionate about designing
          and developing modern websites
        </p>
        <button class="chat">
          Get Started
          <ion-icon name="logo-wechat"></ion-icon>
        </button>
        <button class="learn-more">Learn More</button>
      </div>
      <img src="colors.png" class="colors" alt="">
      <ul class="sci">
        <li>
          <a href="#"><ion-icon name="logo-facebook"></ion-icon></a>
        </li>
        <li>
          <a href="#"><ion-icon name="logo-twitter"></ion-icon></a>
        </li>
        <li>
          <a href="#"><ion-icon name="logo-instagram"></ion-icon></a>
        </li>
      </ul>
      <div class="dayNight">
        <ion-icon name="moon-outline"></ion-icon>
        <ion-icon name="sunny-outline"></ion-icon>
      </div>
    </section>

    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
    <script>
      let banner = document.querySelector(".banner");
      let dayNight = document.querySelector(".dayNight");

      dayNight.oneclick = () => {
        banner.classList.toggle("night");
      }
    </script>
  </body>
</html>
